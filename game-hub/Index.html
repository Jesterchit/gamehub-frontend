<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameHub — Вход</title>
    <link rel="stylesheet" href="css/style.css">
    <style>

        .auth-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0F0F1A 0%, #1A1A2E 50%, #16213E 100%);
            padding: 20px;
        }
        .auth-card {
            background-color: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border);
        }
        .auth-card__logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-light);
            margin-bottom: 8px;
            letter-spacing: 1px;
        }
        .auth-card__subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }
        .auth-card__tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 2px solid var(--border);
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            transition: all var(--transition);
            background: none;
        }
        .auth-tab.active {
            color: var(--accent-light);
            border-bottom-color: var(--accent);
        }
        .auth-tab:hover {
            color: var(--text-primary);
        }
        .auth-form {
            display: block;
        }
        .auth-form.hidden {
            display: none;
        }
        .form-group {
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }
        .form-group input {
            height: 46px;
            font-size: 0.95rem;
        }
        .form-error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 4px;
            display: none;
        }
        .auth-form .btn-primary {
            width: 100%;
            height: 46px;
            font-size: 1rem;
            margin-top: 8px;
        }
        .auth-form__footer {
            text-align: center;
            margin-top: 16px;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-card__logo">&#127918; GAMEHUB</div>
            <p class="auth-card__subtitle">Покупайте и управляйте играми</p>

            <div class="auth-card__tabs">
                <button class="auth-tab active" data-form="login-form">Войти</button>
                <button class="auth-tab" data-form="register-form">Регистрация</button>
            </div>

            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="example@mail.ru">
                    <div class="form-error" id="email-error"></div>
                </div>
                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль">
                    <div class="form-error" id="password-error"></div>
                </div>
                <button type="submit" class="btn-primary">Войти</button>
                <p class="auth-form__footer">Нет аккаунта? Нажмите «Регистрация»</p>
            </form>

            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" placeholder="example@mail.ru">
                    <div class="form-error" id="reg-email-error"></div>
                </div>
                <div class="form-group">
                    <label for="reg-password">Пароль</label>
                    <input type="password" id="reg-password" placeholder="Минимум 6 символов">
                    <div class="form-error" id="reg-password-error"></div>
                </div>
                <div class="form-group">
                    <label for="reg-confirm">Подтверждение пароля</label>
                    <input type="password" id="reg-confirm" placeholder="Повторите пароль">
                    <div class="form-error" id="reg-confirm-error"></div>
                </div>
                <button type="submit" class="btn-primary">Зарегистрироваться</button>
                <p class="auth-form__footer">Уже есть аккаунт? Нажмите «Войти»</p>
            </form>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>

        document.querySelectorAll('.auth-tab').forEach(tab => {
            tab.addEventListener('click', function () {
                const targetForm = this.getAttribute('data-form');

                document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));

                this.classList.add('active');
                document.getElementById(targetForm).classList.remove('hidden');
            });
        });
    </script>

</body>
</html>
